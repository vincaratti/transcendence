services:

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - auth-service
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - frontend-network
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./prisma:/app/prisma
    depends_on:
      - postgresql
    networks:
      - backend-network
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    env_file: .env
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
    volumes:
      - ./auth-service:/app
      - /app/node_modules
      - ./prisma:/app/prisma
    depends_on:
      - postgresql
    networks:
      - backend-network
    restart: unless-stopped

  postgresql:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  frontend-network:
  backend-network:
