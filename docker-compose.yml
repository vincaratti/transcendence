services:

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Serve the frontend files — swap this for a build artifact later
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

